<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Juneteenth – HACLB</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #111111;
    font-family: 'Inter', sans-serif;
    position: relative;
  }

  /* ── Animated geometric background ── */
  .geo-canvas { position: absolute; inset: 0; overflow: hidden; z-index: 0; }

  .diamond {
    position: absolute;
    border-radius: 4px;
    transform-origin: center;
    opacity: 0.15;
    animation: spin linear infinite;
  }
  .d1 { width: 300px; height: 300px; background: #cc0000; top: -100px; left: -80px; animation-duration: 28s; }
  .d2 { width: 200px; height: 200px; background: #f5c400; top: 320px;  left: -50px; animation-duration: 20s; animation-direction: reverse; }
  .d3 { width: 360px; height: 360px; background: #1a7a2a; top: 420px;  left: 880px; animation-duration: 35s; }
  .d4 { width: 160px; height: 160px; background: #cc0000; top: -60px;  left:1080px; animation-duration: 18s; animation-direction: reverse; }
  .d5 { width: 240px; height: 240px; background: #f5c400; top: 180px;  left: 520px; animation-duration: 40s; }
  .d6 { width: 120px; height: 120px; background: #1a7a2a; top: 580px;  left: 280px; animation-duration: 15s; animation-direction: reverse; }
  .d7 { width: 180px; height: 180px; background: #cc0000; top:  90px;  left: 730px; animation-duration: 22s; }

  .strip {
    position: absolute; height: 8px; border-radius: 4px; opacity: 0.22;
    animation: drift linear infinite;
  }
  .s1 { width:180px; background:#cc0000; top: 80px; left:-200px; animation-duration:12s; animation-delay:0s; }
  .s2 { width:120px; background:#f5c400; top:200px; left:-200px; animation-duration:16s; animation-delay:2s; }
  .s3 { width:220px; background:#1a7a2a; top:380px; left:-200px; animation-duration:10s; animation-delay:4s; }
  .s4 { width:160px; background:#cc0000; top:520px; left:-200px; animation-duration:14s; animation-delay:1s; }
  .s5 { width:100px; background:#f5c400; top:640px; left:-200px; animation-duration:18s; animation-delay:3s; }

  .orb {
    position: absolute; border-radius: 50%; opacity: 0.10;
    animation: floatAnim ease-in-out infinite;
  }
  .o1 { width:80px;  height:80px;  background:#f5c400; top: 50px;  right:200px; animation-duration:6s; }
  .o2 { width:50px;  height:50px;  background:#cc0000; top:550px;  left:200px;  animation-duration:8s; animation-delay:1s; }
  .o3 { width:100px; height:100px; background:#1a7a2a; top:300px;  right: 80px; animation-duration:7s; animation-delay:2s; }
  .o4 { width:40px;  height:40px;  background:#f5c400; top:150px;  left:450px;  animation-duration:5s; animation-delay:0.5s; }

  .spark { position:absolute; width:0; height:0; animation:pulse ease-in-out infinite; }
  .sp1 { border-left:20px solid transparent; border-right:20px solid transparent; border-bottom:35px solid #f5c400; top:120px; left:920px; opacity:0.3; animation-duration:3s; }
  .sp2 { border-left:14px solid transparent; border-right:14px solid transparent; border-bottom:24px solid #cc0000; top:580px; left:600px; opacity:0.25; animation-duration:4s; animation-delay:1s; }
  .sp3 { border-left:18px solid transparent; border-right:18px solid transparent; border-bottom:30px solid #1a7a2a; top: 60px; left:400px; opacity:0.25; animation-duration:3.5s; animation-delay:0.5s; }

  @keyframes spin     { from{transform:rotate(0deg) skewX(12deg)} to{transform:rotate(360deg) skewX(12deg)} }
  @keyframes drift    { from{transform:translateX(0)} to{transform:translateX(1700px)} }
  @keyframes floatAnim{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
  @keyframes pulse    { 0%,100%{opacity:0.2;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* Pan-African color bars */
  .bar-top, .bar-bottom {
    position:absolute; left:0; right:0; height:10px; display:flex; z-index:10;
  }
  .bar-top    { top:0; }
  .bar-bottom { bottom:0; }
  .bar-top    span:nth-child(1), .bar-bottom span:nth-child(4) { background:#cc0000; flex:1; }
  .bar-top    span:nth-child(2), .bar-bottom span:nth-child(3) { background:#222222; flex:1; }
  .bar-top    span:nth-child(3), .bar-bottom span:nth-child(2) { background:#1a7a2a; flex:1; }
  .bar-top    span:nth-child(4), .bar-bottom span:nth-child(1) { background:#f5c400; flex:1; }

  /* Main content */
  .content {
    position: absolute;
    inset: 10px;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px 80px 20px;
    animation: fadeUp 1s ease forwards;
  }

  .headline {
    font-family: 'Fraunces', serif;
    font-size: 128px;
    font-weight: 900;
    line-height: 0.92;
    color: #ffffff;
    letter-spacing: -3px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    margin-bottom: 16px;
  }
  .headline em {
    font-style: italic;
    color: #f5c400;
  }

  .divider {
    width: 180px;
    height: 4px;
    background: linear-gradient(90deg, #cc0000, #f5c400, #1a7a2a);
    border-radius: 2px;
    margin-bottom: 18px;
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 400;
    color: rgba(255,255,255,0.88);
    line-height: 1.5;
    max-width: 820px;
  }
  .tagline strong { font-weight: 700; color: #ffffff; }

  .reopen {
    margin-top: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 19px;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.04em;
  }
  .reopen span { color: #f5c400; font-weight: 700; }

  /* Logo */
  .logo-wrap {
    position: absolute;
    bottom: 22px;
    right: 36px;
    z-index: 10;
  }
  .logo-wrap img { height: 56px; width: auto; opacity: 0.95; }

  /* Star accents */
  .star { position:absolute; z-index:10; font-size:32px; color:#f5c400; animation:pulse 4s ease-in-out infinite; }
  .star-tl { top:20px; left:36px; }
  .star-tr { top:20px; right:36px; animation-delay:1s; }
</style>
</head>
